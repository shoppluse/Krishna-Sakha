<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Sakha - Immersive Evening Kirtan</title>
    <style>
        /* --- Premium Typography & Variables (Preserved From Project Design Language) --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --gold-primary: #f39c12;
            --gold-light: #f1c40f;
            --gold-glow: rgba(241, 196, 15, 0.6);
            --peacock-blue: #0a3d62;
            --deep-blue: #071e3d;
            --text-light: #f5f6fa;
            --transition-speed: 0.4s;
            --glass-bg: rgba(7, 30, 61, 0.75);
            --glass-border: rgba(241, 196, 15, 0.3);
            --lyrics-font-size: 1.1rem;
        }

        /* --- Reset & Base Layout --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #020b14;
            color: var(--text-light);
            overflow: hidden;
        }

        /* --- Immersive Scenery Canvas --- */
        #kirtan-scenery-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-dusk-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(43, 23, 76, 0.25) 0%, rgba(243, 156, 18, 0.1) 60%, rgba(2, 11, 20, 0.6) 100%);
        }

        /* --- Main Framework Container --- */
        .app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        /* --- Top Navigation Bar --- */
        .top-nav {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--gold-light);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(241,196,15,0.1);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .page-title {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold-light);
            font-size: 1.6rem;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .streak-badge {
            font-family: 'Cinzel', serif;
            background: rgba(243, 156, 18, 0.15);
            border: 1px solid var(--gold-primary);
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--gold-light);
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* --- Workspace Layout --- */
        .workspace-grid {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 340px 1fr 340px;
            gap: 20px;
            flex-grow: 1;
            min-height: 0;
        }

        @media (max-width: 1000px) {
            .workspace-grid {
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
        }

        /* --- Left Column: Altar & Animated Krishna --- */
        .altar-sanctum {
            background: rgba(4, 19, 41, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            min-height: 400px;
        }

        .avatar-dome {
            height: 260px;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .krishna-avatar-svg {
            width: 130px;
            height: 190px;
            z-index: 3;
            transform-origin: bottom center;
            transition: transform 0.5s ease;
        }

        /* Swaying effect triggered during playback active */
        .swaying-bhajan {
            animation: divineSway 2.5s infinite alternate ease-in-out;
        }

        @keyframes divineSway {
            0% { transform: rotate(-3deg) scale(1); }
            100% { transform: rotate(3deg) scale(1.02); }
        }

        .courtyard-seat {
            position: absolute;
            bottom: 0;
            width: 180px;
            height: 14px;
            background: linear-gradient(90deg, #2c3e50 0%, #7f8c8d 50%, #2c3e50 100%);
            border: 2px solid var(--gold-primary);
            border-radius: 4px;
            z-index: 2;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        /* --- Center Column: Player & Track Cards --- */
        .player-core-hub {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .premium-kirtan-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        .track-artwork-frame {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--peacock-blue) 0%, var(--deep-blue) 100%);
            border: 2px solid var(--gold-light);
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(241,196,15,0.2);
            font-size: 2rem;
            animation: spinningArtwork 20s linear infinite paused;
        }

        .playing-active .track-artwork-frame {
            animation-play-state: running;
        }

        @keyframes spinningArtwork {
            to { transform: rotate(360deg); }
        }

        .track-title {
            font-family: 'Cinzel', serif;
            color: var(--gold-light);
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .track-meta {
            font-size: 0.8rem;
            color: #a4b0be;
            margin-bottom: 15px;
        }

        /* --- Synchronized Lyrics Panel --- */
        .lyrics-panel {
            background: rgba(2, 11, 20, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .lyric-line {
            font-size: var(--lyrics-font-size);
            color: #747d8c;
            text-align: center;
            transition: all 0.3s;
            font-weight: 500;
        }

        .lyric-line.active-line {
            color: var(--gold-light);
            font-weight: 600;
            text-shadow: 0 0 10px var(--gold-glow);
            transform: scale(1.05);
        }

        .lyrics-panel-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }

        /* --- Audio Controls Dashboard Rig --- */
        .audio-rig-controls {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: #a4b0be;
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--gold-primary);
            width: 0%;
            border-radius: 3px;
            position: relative;
        }

        .master-buttons-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .btn-player-node {
            background: transparent;
            border: none;
            color: #a4b0be;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-player-node:hover, .btn-player-node.active-toggle {
            color: var(--gold-light);
            filter: drop-shadow(0 0 5px var(--gold-glow));
        }

        .btn-play-master {
            width: 50px;
            height: 50px;
            background: var(--gold-primary);
            color: #020b14;
            border-radius: 50%;
            font-size: 1.2rem;
        }
        .btn-play-master:hover {
            background: var(--gold-light);
            transform: scale(1.05);
        }

        /* --- Right Column: Playlist & Tracks Inventory --- */
        .playlist-sanctuary {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        .playlist-title {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            color: var(--gold-light);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(241,196,15,0.2);
            padding-bottom: 6px;
        }

        .tracks-deck-scroll {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .track-row-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s;
        }

        .track-row-card:hover, .track-row-card.selected-playing {
            border-color: var(--gold-light);
            background: rgba(10, 61, 98, 0.4);
        }

        .track-row-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-row-details h5 {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .track-row-card.selected-playing .track-row-details h5 {
            color: var(--gold-light);
        }

        .track-row-details p {
            font-size: 0.7rem;
            color: #a4b0be;
        }

        /* --- Global Bottom Navigation Framework --- */
        .bottom-nav {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 900px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            padding: 6px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #a4b0be;
            font-size: 0.65rem;
            font-weight: 600;
            text-decoration: none;
            padding: 8px 0;
            border-radius: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            margin-bottom: 3px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--gold-light);
            background: rgba(255,255,255,0.04);
        }
    </style>
</head>

    <script>
        /* ================= KIRTAN INVENTORY DATA ARCHITECTURE MATRIX ================= */
        const KIRTAN_DATABASE = [
            { id: "maha_mantra", title: "Hare Krishna Maha Mantra", singer: "Vraja Residents", mood: "Deep Devotion", lyrics: ["Hare Krishna Hare Krishna", "Krishna Krishna Hare Hare", "Hare Rama Hare Rama", "Rama Rama Hare Hare"] },
            { id: "govindam", title: "Govindam Adi Purusham", singer: "Temple Choir", mood: "Awe & Reverence", lyrics: ["Govindam adi-purusham tam aham bhajami", "Venum kvanantam aravinda-dalayataksam", "Barhavatamsam asitambuda-sundarangam", "Kandarpa-koti-kamaniya-visesa-sobham"] },
            { id: "damodarastakam", title: "Sri Damodarastakam", singer: "Sanskrit Pandits", mood: "Maternal Affection", lyrics: ["Namamisvaram sac-cid-ananda-rupam", "Lasat-kundalam gokule brajamanam", "Yasoda-bhiyolukhalad dhavayamanam", "Paramristam atyantato drutya gopya"] },
            { id: "radha_madhava", title: "Jaya Radha Madhava", singer: "Forest Monks", mood: "Tranquil Peace", lyrics: ["Jaya Radha-Madhava kunja-bihari", "Gopi-jana-vallabha giri-vara-dhari", "Yasoda-nandana braja-jana-ranjana", "Yamuna-tira-vana-cari kunja-bihari"] }
        ];

        /* --- Local Context Tracking States --- */
        let activeTrackIndex = 0;
        let playActiveState = false;
        let mockProgressTimerInterval = null;
        let currentPlaybackPositionSeconds = 0;
        const totalTrackDurationSeconds = 60; // Standard normalized mock timer wrap duration boundary
        let lastPlayedBehavior = "";

        /* --- Ambient Scenery Dynamics Canvas Render Processing Engine --- */
        const canvas = document.getElementById('kirtan-scenery-canvas');
        const ctx = canvas.getContext('kirtan-2d') || canvas.getContext('2d');
        let scenicFloatingParticlesArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class DuskSceneryParticle {
            constructor(type) {
                this.type = type; // 'petal', 'lampGlow', 'sparkle'
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = this.type === 'petal' ? -20 : Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1.5;
                this.speedY = this.type === 'petal' ? (Math.random() * 0.5 + 0.2) : -(Math.random() * 0.4 + 0.1);
                this.speedX = Math.random() * 0.6 - 0.3;
                this.alpha = Math.random() * 0.6 + 0.2;
                this.angle = Math.random() * Math.PI;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < -30 || this.y > canvas.height + 30 || this.x < -30 || this.x > canvas.width + 30) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.globalAlpha = this.alpha;
                if(this.type === 'petal') {
                    ctx.rotate(this.angle);
                    ctx.fillStyle = "#ff7675"; // Vibrant loose flower petal drops 
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size, this.size * 1.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = "rgba(243, 156, 18, 0.6)"; // Deep golden twilight lamp aura particle
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // Populate Initial Scenery Environmental Particles Stack Array
        for(let i=0; i<15; i++) scenicFloatingParticlesArray.push(new DuskSceneryParticle('petal'));
        for(let i=15; i<40; i++) scenicFloatingParticlesArray.push(new DuskSceneryParticle('sparkle'));

        function runSceneryGraphicsEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Build rich deep gradient background representing Vrindavan courtyard dusk directly via canvas context
            let backgroundGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            backgroundGrad.addColorStop(0, '#0c1b33');
            backgroundGrad.addColorStop(0.5, '#1e1435');
            backgroundGrad.addColorStop(1, '#050a12');
            ctx.fillStyle = backgroundGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let node of scenicFloatingParticlesArray) {
                node.update();
                node.draw();
            }
            requestAnimationFrame(runSceneryGraphicsEngine);
        }
        runSceneryGraphicsEngine();

        /* --- Life-cycle Initializations & Storage Operations --- */
        document.addEventListener("DOMContentLoaded", () => {
            syncStateMetricsFromStorage();
            renderTracksInventoryDeck();
            synchronizeActiveTrackHUDView();
            initializeCharacterBehaviorLoop();
        });

        function syncStateMetricsFromStorage() {
            let streak = parseInt(localStorage.getItem("kirtan_streak") || "1");
            document.getElementById("streak-node-lbl").innerText = streak;

            let lastTrack = localStorage.getItem("kirtan_last_index");
            if(lastTrack) activeTrackIndex = parseInt(lastTrack);
        }

        function renderTracksInventoryDeck() {
            const grid = document.getElementById("tracks-injection-grid");
            grid.innerHTML = "";
            KIRTAN_DATABASE.forEach((track, idx) => {
                let card = document.createElement("div");
                card.className = `track-row-card ${idx === activeTrackIndex ? 'selected-playing' : ''}`;
                card.id = `track-card-node-${idx}`;
                card.onclick = () => selectSpecificTrackTarget(idx);
                card.innerHTML = `
                    <div class="track-row-left">
                        <div style="font-size: 1rem; color: var(--gold-light);">🌸</div>
                        <div class="track-row-details">
                            <h5>${track.title}</h5>
                            <p>${track.singer}</p>
                        </div>
                    </div>
                    <span style="font-size: 0.75rem; color:#a4b0be;">1:00</span>
                `;
                grid.appendChild(card);
            });
        }

        /* --- Interactive Playback Core Engines --- */
        function synchronizeActiveTrackHUDView() {
            const track = KIRTAN_DATABASE[activeTrackIndex];
            document.getElementById("hub-title-lbl").innerText = track.title;
            document.getElementById("hub-meta-lbl").innerText = `Mood: ${track.mood} • Singer: ${track.singer}`;

            // Build synchronized lyrics lines output programmatically
            const view = document.getElementById("lyrics-viewport-node");
            view.innerHTML = "";
            track.lyrics.forEach((line, index) => {
                let div = document.createElement("div");
                div.className = `lyric-line ${index === 0 ? 'active-line' : ''}`;
                div.id = `lyric-line-${index}`;
                div.innerText = line;
                view.appendChild(div);
            });

            // Highlight selected playing rows items in inventory deck
            document.querySelectorAll(".track-row-card").forEach(el => el.classList.remove("selected-playing"));
            const card = document.getElementById(`track-card-node-${activeTrackIndex}`);
            if(card) card.classList.add("selected-playing");

            localStorage.setItem("kirtan_last_index", activeTrackIndex.toString());
        }

        function selectSpecificTrackTarget(targetIdx) {
            if(playActiveState) toggleKirtanPlayback(); // Terminate ongoing progress cycles cleanly
            activeTrackIndex = targetIdx;
            currentPlaybackPositionSeconds = 0;
            updateProgressBarsUIRender();
            synchronizeActiveTrackHUDView();
            toggleKirtanPlayback(); // Seamlessly play target track instantly
        }

        function toggleKirtanPlayback() {
            const trigger = document.getElementById("play-trigger");
            const box = document.getElementById("player-master-context-box");
            const avatar = document.getElementById("krishna-bhajan-avatar");

            playActiveState = !playActiveState;

            if(playActiveState) {
                trigger.innerText = "⏸";
                box.classList.add("playing-active");
                avatar.classList.add("swaying-bhajan");
                startMockTimerProgressTicker();
            } else {
                trigger.innerText = "▶";
                box.classList.remove("playing-active");
                avatar.classList.remove("swaying-bhajan");
                clearInterval(mockProgressTimerInterval);
            }
        }

        function startMockTimerProgressTicker() {
            mockProgressTimerInterval = setInterval(() => {
                currentPlaybackPositionSeconds += 1;
                if(currentPlaybackPositionSeconds > totalTrackDurationSeconds) {
                    currentPlaybackPositionSeconds = 0;
                    navigateTrackPlayback(1); // Auto wrap to next track item on finish loop
                    return;
                }
                updateProgressBarsUIRender();
                synchronizeLiveLyricsHighlighter();
                
                // Occasional dynamic automatic sync particle emissions during ongoing playback
                if(currentPlaybackPositionSeconds % 4 === 0) {
                    triggerCharacterJoyfulReactionStep();
                }
            }, 1000);
        }

        function navigateTrackPlayback(direction) {
            if(playActiveState) toggleKirtanPlayback();
            activeTrackIndex = (activeTrackIndex + direction + KIRTAN_DATABASE.length) % KIRTAN_DATABASE.length;
            currentPlaybackPositionSeconds = 0;
            updateProgressBarsUIRender();
            synchronizeActiveTrackHUDView();
            toggleKirtanPlayback();
        }

        function updateProgressBarsUIRender() {
            let percentage = (currentPlaybackPositionSeconds / totalTrackDurationSeconds) * 100;
            document.getElementById("progress-track-fill").style.width = `${percentage}%`;

            let secMarker = (currentPlaybackPositionSeconds % 60).toString().padStart(2, '0');
            document.getElementById("time-elapsed-node").innerText = `0:${secMarker}`;
        }

        function handleProgressBarSeek(event) {
            const bar = event.currentTarget;
            const bounds = bar.getBoundingClientRect();
            const clickX = event.clientX - bounds.left;
            let percentage = clickX / bounds.width;
            
            currentPlaybackPositionSeconds = Math.floor(percentage * totalTrackDurationSeconds);
            updateProgressBarsUIRender();
            synchronizeLiveLyricsHighlighter();
        }

        function synchronizeLiveLyricsHighlighter() {
            const track = KIRTAN_DATABASE[activeTrackIndex];
            let segmentSize = totalTrackDurationSeconds / track.lyrics.length;
            let targetActiveLyricLineIndex = Math.min(Math.floor(currentPlaybackPositionSeconds / segmentSize), track.lyrics.length - 1);

            document.querySelectorAll(".lyric-line").forEach((el, index) => {
                el.classList.remove("active-line");
                if(index === targetActiveLyricLineIndex) {
                    el.classList.add("active-line");
                    el.scrollIntoView({ behavior: "smooth", block: "nearest" });
                }
            });
        }

        function adjustLyricsFontSize(direction) {
            let currentSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--lyrics-font-size'));
            let targetSize = currentSize + (direction * 0.1);
            if(targetSize >= 0.8 && targetSize <= 1.6) {
                document.documentElement.style.setProperty('--lyrics-font-size', `${targetSize}rem`);
            }
        }

        /* --- Playback Configuration Decorators Toggles --- */
        function toggleShuffleMode(node) { node.classList.toggle("active-toggle"); }
        function toggleRepeatMode(node) { node.classList.toggle("active-toggle"); }

        /* --- Seated Avatar Behavioral Micro-Animations Loop Framework --- */
        const behaviorsPoolList = ['smile', 'blink', 'clapStance', 'playFluteMode'];

        function initializeCharacterBehaviorLoop() {
            if (playActiveState) {
                // Let the automated animation framework rest to preserve rhythmic swaying loops parameters
                setTimeout(initializeCharacterBehaviorLoop, 4000);
                return;
            }

            let nextPool = behaviorsPoolList.filter(b => b !== lastPlayedBehavior);
            let targetStance = nextPool[Math.floor(Math.random() * nextPool.length)];
            lastPlayedBehavior = targetStance;

            setAvatarVisualStance(targetStance);
            setTimeout(initializeCharacterBehaviorLoop, Math.random() * 5000 + 6000);
        }

        function setAvatarVisualStance(state) {
            const elL = document.getElementById("eye-l");
            const elR = document.getElementById("eye-r");
            const smile = document.getElementById("krishna-smile");
            const flute = document.getElementById("divine-flute");
            const avatar = document.getElementById("krishna-bhajan-avatar");

            elL.setAttribute("d", "M43 47 Q45 45 47 47");
            elR.setAttribute("d", "M53 47 Q55 45 57 47");
            smile.setAttribute("d", "M46 54 Q50 57 54 54");
            flute.style.display = "none";
            avatar.style.transform = "scale(1)";

            switch(state) {
                case 'blink':
                    elL.setAttribute("d", "M43 47 L47 47");
                    elR.setAttribute("d", "M53 47 L57 47");
                    break;
                case 'smile':
                    smile.setAttribute("d", "M44 52 Q50 61 56 52");
                    avatar.style.transform = "scale(1.03)";
                    break;
                case 'playFluteMode':
                    flute.style.display = "block";
                    smile.setAttribute("d", "M47 47 Q50 49 53 47");
                    break;
            }
        }

        function triggerCharacterJoyfulReactionStep() {
            setAvatarVisualStance('smile');
            // Flash random burst sparkles elements inside active scene array matrix
            for(let i=0; i<8; i++) {
                scenicFloatingParticlesArray.push(new DuskSceneryParticle('sparkle'));
            }
        }
    </script>
</body>
</html>
